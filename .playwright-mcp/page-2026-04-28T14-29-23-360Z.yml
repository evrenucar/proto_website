              - generic [ref=e416]: "$$\\rho \\left( \\frac{\\partial \\mathbf{u}}{\\partial t} + \\mathbf{u} \\cdot \\nabla \\mathbf{u} \\right) = -\\nabla p + \\nabla \\cdot \\left[ \\mu \\left( \\nabla \\mathbf{u} + (\\nabla \\mathbf{u})^T - \\frac{2}{3}(\\nabla \\cdot \\mathbf{u})\\mathbf{I} \\right) \\right] + \\rho \\mathbf{g}$$"
