                - text: "$\\frac{\\partial \\mathbf{u}}{\\partial t}$ is the unsteady acceleration (how velocity changes over time at a fixed point)."
              - generic [ref=e428]:
                - generic [ref=e429]: •
                - text: "$\\mathbf{u} \\cdot \\nabla \\mathbf{u}$ is the convective acceleration (acceleration as the fluid moves through space)."
              - generic [ref=e430]:
