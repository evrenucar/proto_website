                    - generic "Infinite canvas" [ref=f1e62]:
                      - generic [ref=f1e64]: From Wikipedia, the free encyclopedia
                      - generic [ref=f1e66]:
                        - figure "Scott McCloud described the possibility of linking webcomic panels using \"trails\", suggesting it offers distinct storytelling advantages.[1]" [ref=f1e67]:
                          - link "Blank panels of various sizes are linked by a line, guiding a reader's eyes right, down, left, diagonally up, and down again." [ref=f1e68] [cursor=pointer]:
                            - /url: /wiki/File:Infinite_Canvas_trails.PNG
                            - img "Blank panels of various sizes are linked by a line, guiding a reader's eyes right, down, left, diagonally up, and down again." [ref=f1e69]
                          - generic [ref=f1e70]:
                            - text: Scott McCloud described the possibility of linking webcomic panels using "trails", suggesting it offers distinct storytelling advantages.
                            - superscript [ref=f1e71]:
                              - link "[1]" [ref=f1e72] [cursor=pointer]:
                                - /url: "#cite_note-1"
                        - paragraph [ref=f1e73]:
                          - text: The infinite canvas is the feeling of available space for a
                          - link "webcomic" [ref=f1e74] [cursor=pointer]:
                            - /url: /wiki/Webcomic
                          - text: on the
                          - link "World Wide Web" [ref=f1e75] [cursor=pointer]:
                            - /url: /wiki/World_Wide_Web
                          - text: relative to paper. The term was introduced by
                          - link "Scott McCloud" [ref=f1e76] [cursor=pointer]:
                            - /url: /wiki/Scott_McCloud
                          - text: in his 2000 book
                          - link "Reinventing Comics" [ref=f1e78] [cursor=pointer]:
                            - /url: /wiki/Reinventing_Comics
                          - text: ", which supposes a"
                          - link "web page" [ref=f1e79] [cursor=pointer]:
                            - /url: /wiki/Web_page
                          - text: can grow as large as needed. This infinite canvas gives infinite storytelling features and creators more freedom in how they present their artwork.
                        - paragraph [ref=f1e80]:
                          - text: Journalists responded doubtfully, because five years after the publication of Reinventing Comics, the concept had not been widely adopted. Webcomics were primarily presented in the form of
                          - link "comic strips" [ref=f1e81] [cursor=pointer]:
                            - /url: /wiki/Comic_strips
                          - text: ", which fit easily on a screen. Many artists experiment with the infinite canvas, however, and comics growing beyond what is possible in print has gained some popularity over the years."
                        - generic [ref=f1e82]:
                          - heading "Description" [level=2] [ref=f1e83]
                          - generic [ref=f1e84]:
                            - text: "["
                            - link "edit" [ref=f1e85] [cursor=pointer]:
                              - /url: /w/index.php?title=Infinite_canvas&action=edit&section=1
                            - text: "]"
                        - paragraph [ref=f1e86]:
                          - text: In
                          - link "comic books" [ref=f1e87] [cursor=pointer]:
                            - /url: /wiki/Comic_books
                          - text: ", the panels are fit according to the page, thus limiting artists to few arrangements for each page. In his 2000 book, Reinventing Comics, cartoonist Scott McCloud proposes that a web page solves the problem. Instead of making the monitor the \"page\", McCloud suggests making it a \"window\" upon an infinite canvas. A webcomic artist could give a reader an ability to"
                          - link "zoom in and out" [ref=f1e88] [cursor=pointer]:
                            - /url: /wiki/Zooming_user_interface
                          - text: "rendering the comic infinitely large. McCloud wrote that webcomics could be made any shape: vertically like a tower, horizontally like a skyline, diagonally like a descending staircase, or even three dimensionally like a revolving cube."
                          - superscript [ref=f1e89]:
                            - link "[2]" [ref=f1e90] [cursor=pointer]:
                              - /url: "#cite_note-ReinventingComics-2"
                        - paragraph [ref=f1e91]:
                          - text: According to David Balan of
                          - link "Sequart Organization" [ref=f1e93] [cursor=pointer]:
                            - /url: /wiki/Sequart_Organization
                          - text: ", some webcomics might require small size pages (due to slow internet) and using"
                          - link "hyperlinks" [ref=f1e94] [cursor=pointer]:
                            - /url: /wiki/Hyperlinks
                          - text: to move forward in the story consistently takes the reader out of the experience, because there exists no visual link between any two pages. Balan praised McCloud's 2003 webcomic,
                          - generic [ref=f1e95]:
                            - link "The Right Number" [ref=f1e96] [cursor=pointer]:
                              - /url: /wiki/The_Right_Number
                            - text: ","
                          - text: for its zooming interface, which would have the same benefits as other infinite canvas formats, but still allows for a certain rhythm to exist.
                          - superscript [ref=f1e97]:
                            - link "[3]" [ref=f1e98] [cursor=pointer]:
                              - /url: "#cite_note-Sequart-3"
                          - text: Other artists known for making persistent use of the infinite canvas in the early 2000s include
                          - link "Cayetano Garza" [ref=f1e99] [cursor=pointer]:
                            - /url: /wiki/Cayetano_Garza
                          - text: ","
                          - link "demian5" [ref=f1e100] [cursor=pointer]:
                            - /url: /wiki/Demian5
                          - text: ","
                          - link "Patrick Farley" [ref=f1e101] [cursor=pointer]:
                            - /url: /wiki/Patrick_Farley
                          - text: ","
                          - link "Tristan A. Farnon" [ref=f1e102] [cursor=pointer]:
                            - /url: /wiki/Tristan_A._Farnon
                          - text: ", and David Gaddis."
                          - superscript [ref=f1e103]:
                            - link "[4]" [ref=f1e104] [cursor=pointer]:
                              - /url: "#cite_note-Campbell-4"
                        - generic [ref=f1e105]:
                          - heading "Usage" [level=2] [ref=f1e106]
                          - generic [ref=f1e107]:
                            - text: "["
                            - link "edit" [ref=f1e108] [cursor=pointer]:
                              - /url: /w/index.php?title=Infinite_canvas&action=edit&section=2
                            - text: "]"
                        - paragraph [ref=f1e109]:
                          - text: In 2005,
                          - link "Daniel Merlin Goodbrey" [ref=f1e110] [cursor=pointer]:
                            - /url: /wiki/Daniel_Merlin_Goodbrey
                          - text: created the "Tarquin Engine", a piece of Web software that uses
                          - link "Adobe Flash" [ref=f1e111] [cursor=pointer]:
                            - /url: /wiki/Adobe_Flash
                          - text: to depict an infinite canvas that a reader can freely scroll through and zoom in on. It greatly simplified the production of infinite canvas webcomics.
                          - superscript [ref=f1e112]:
                            - link "[5]" [ref=f1e113] [cursor=pointer]:
                              - /url: "#cite_note-5"
                          - superscript [ref=f1e114]:
                            - link "[6]" [ref=f1e115] [cursor=pointer]:
                              - /url: "#cite_note-6"
                          - text: The tool is not widely used. In 2009,
                          - link "Microsoft Live Labs" [ref=f1e116] [cursor=pointer]:
                            - /url: /wiki/Microsoft_Live_Labs
                          - text: released an infinite canvas
                          - link "web application" [ref=f1e117] [cursor=pointer]:
                            - /url: /wiki/Web_application
                          - text: ", which reached a wider audience."
                          - superscript [ref=f1e118]:
                            - link "[7]" [ref=f1e119] [cursor=pointer]:
                              - /url: "#cite_note-7"
                        - paragraph [ref=f1e120]:
                          - text: In 2013, Yvyes Bigerel and
                          - link "Mark Waid" [ref=f1e121] [cursor=pointer]:
                            - /url: /wiki/Mark_Waid
                          - text: of
                          - link "Marvel Comics" [ref=f1e122] [cursor=pointer]:
                            - /url: /wiki/Marvel_Comics
                          - text: launched an initiative to create and publish digital comics under the title
                          - link "Marvel ReEvolution" [ref=f1e123] [cursor=pointer]:
                            - /url: /wiki/Marvel_ReEvolution
                          - text: . While creating these webcomics, Bigerel and Waid were inspired by the manner in which time is experienced within comics, as the passage of time in a comic book is ultimately controlled by its reader. Rather than to allow readers to skim through the images on a whim or to increase the space between panels as McCloud suggested, the duo stacked the panels up "like a
                          - link "PowerPoint" [ref=f1e124] [cursor=pointer]:
                            - /url: /wiki/PowerPoint
                          - text: slideshow," forcing the reader to look at one panel at a time. According to
                          - link "Comic Book Resources" [ref=f1e126] [cursor=pointer]:
                            - /url: /wiki/Comic_Book_Resources
                          - text: ", this design directly affects how a comic is created and read, as surprises can be better controlled and a letterer could directly control the reading order of text balloons."
                          - superscript [ref=f1e127]:
                            - link "[8]" [ref=f1e128] [cursor=pointer]:
                              - /url: "#cite_note-8"
                          - text: Rachel Edidin of
                          - link "Wired" [ref=f1e130] [cursor=pointer]:
                            - /url: /wiki/Wired_(website)
                          - text: "said of Wolverine: Japan's Most Wanted and Iron Man: Fatal Frontier that \"these are comics that truly feel native to the digital format.\""
                          - superscript [ref=f1e131]:
                            - link "[9]" [ref=f1e132] [cursor=pointer]:
                              - /url: "#cite_note-9"
                        - paragraph [ref=f1e133]:
                          - text: In 2016,
                          - link "Oculus Story Studio" [ref=f1e134] [cursor=pointer]:
                            - /url: /wiki/Oculus_Story_Studio
                          - text: released Quill, a piece of software that allows people to create a three-dimensional world on an "infinite canvas", meant to be experienced through
                          - link "virtual reality" [ref=f1e135] [cursor=pointer]:
                            - /url: /wiki/Virtual_reality
                          - text: .
                          - superscript [ref=f1e136]:
                            - link "[10]" [ref=f1e137] [cursor=pointer]:
                              - /url: "#cite_note-10"
                          - superscript [ref=f1e138]:
                            - link "[11]" [ref=f1e139] [cursor=pointer]:
                              - /url: "#cite_note-11"
                          - text: In September 2021, Facebook, now the owner of Oculus, sold Quill to its original creator, who continues to develop and support the app.
                          - superscript [ref=f1e140]:
                            - link "[12]" [ref=f1e141] [cursor=pointer]:
                              - /url: "#cite_note-12"
                        - generic [ref=f1e142]:
                          - heading "Reception" [level=2] [ref=f1e143]
                          - generic [ref=f1e144]:
                            - text: "["
                            - link "edit" [ref=f1e145] [cursor=pointer]:
                              - /url: /w/index.php?title=Infinite_canvas&action=edit&section=3
                            - text: "]"
                        - paragraph [ref=f1e146]:
                          - text: In 2005, Sarah Boxer of
                          - link "The New York Times" [ref=f1e148] [cursor=pointer]:
                            - /url: /wiki/The_New_York_Times
                          - text: stated that the infinite canvas was hard to find in use, as many webcomics were sticking to a printable format. A few, however, like Nicholas Gurewitch's
                          - link "The Perry Bible Fellowship" [ref=f1e150] [cursor=pointer]:
                            - /url: /wiki/The_Perry_Bible_Fellowship
                          - text: and
                          - link "Drew Weing" [ref=f1e151] [cursor=pointer]:
                            - /url: /wiki/Drew_Weing
                          - text: "'s Pup, did make use of the format (Pup won a"
                          - link "Web Cartoonists' Choice Award" [ref=f1e152] [cursor=pointer]:
                            - /url: /wiki/Web_Cartoonists%27_Choice_Award
                          - text: in the "infinite canvas" category in 2005). Boxer pointed out that most popular webcomics either fit on a webpage easily – such as Adrian Ramos's Count Your Sheep – or attempted to use various aspects of the digital medium, such as
                          - link "Flash animation" [ref=f1e153] [cursor=pointer]:
                            - /url: /wiki/Flash_animation
                          - text: and music.
                          - superscript [ref=f1e154]:
                            - link "[13]" [ref=f1e155] [cursor=pointer]:
                              - /url: "#cite_note-13"
                          - text: That same year,
                          - link "Joe Zabel" [ref=f1e156] [cursor=pointer]:
                            - /url: /wiki/Joe_Zabel
                          - text: also noted that the primary purpose for the infinite canvas would be to create lengthy and deep works on the Web, while
                          - link "comic strips" [ref=f1e157] [cursor=pointer]:
                            - /url: /wiki/Comic_strips
                          - text: like
                          - link "PvP" [ref=f1e159] [cursor=pointer]:
                            - /url: /wiki/PvP_(webcomic)
                          - text: and
                          - link "Penny Arcade" [ref=f1e161] [cursor=pointer]:
                            - /url: /wiki/Penny_Arcade
                          - text: showed to have much more success in this environment. Because of the time that would go into any page of an infinite canvas comic, Zabel deemed it unlikely for such webcomics to gain a large popularity. Journalist
                          - link "Eric Burns" [ref=f1e162] [cursor=pointer]:
                            - /url: /wiki/Eric_Burns
                          - text: ", meanwhile, claimed that McCloud was mainly discussing the potential of webcomics, rather than what they are actually like."
                          - superscript [ref=f1e163]:
                            - link "[14]" [ref=f1e164] [cursor=pointer]:
                              - /url: "#cite_note-14"
                        - paragraph [ref=f1e165]:
                          - text: In an interview in 2008, Scott McCloud said that in Reinventing Comics he was "shooting for the moon, in hopes that we could create these radical departures from traditional comics," noting that "most online comics are still pretty conservative in format and style" but also that "there have been some impressive strides in that direction." McCloud specified that he was still keeping an eye on things that needed to happen for the infinite canvas to take off, saying that "the notion of Web applications being as robust as desktop applications has placed us closer to that hope that we may finally be able to create those spaces in a seamless way online. Right now, it's very difficult to do that."
                          - superscript [ref=f1e166]:
                            - link "[15]" [ref=f1e167] [cursor=pointer]:
                              - /url: "#cite_note-15"
                          - text: In an interview in 2014, McCloud said that "without a reliable financial structure to support these experimental webcomics, a lot of people just turn away and get a real job, or start doing three-panel gag strips. Those have an
                          - link "economic model" [ref=f1e168] [cursor=pointer]:
                            - /url: /wiki/Webcomics_and_income
                          - text: that works."
                          - superscript [ref=f1e169]:
                            - link "[16]" [ref=f1e170] [cursor=pointer]:
                              - /url: "#cite_note-2014interview-16"
                        - paragraph [ref=f1e171]:
                          - text: Regardless of the format's initial popularity, a large amount of cartoonists have created infinite canvas webcomics over the years; in the book Storytelling in the Media Convergence Age, cartoonist Daniel Goodbrew states that "the infinite canvas has remained a popular choice among webcomic creators."
                          - superscript [ref=f1e172]:
                            - link "[17]" [ref=f1e173] [cursor=pointer]:
                              - /url: "#cite_note-17"
                          - text: The infinite canvas has shown more success in Europe and Australia than in North America. The infinite canvas has obtained a large popularity among South Korean
